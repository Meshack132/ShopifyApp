services:
  # ── Shopify App ─────────────────────────────────────────────────────────────
  shopify-app:
    build:
      context: .
      dockerfile: Dockerfile
      # If your .csproj is in a subfolder e.g. ./ShopifyApp/, change context to:
      # context: ./ShopifyApp
    container_name: shopify-app
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      # Override appsettings values via environment variables
      - Shopify__ApiKey=${SHOPIFY_API_KEY:-your_api_key_here}
      - Shopify__ApiSecret=${SHOPIFY_API_SECRET:-your_api_secret_here}
      - Shopify__Scopes=read_products,write_products,read_orders
      - Shopify__AppUrl=${APP_URL:-http://localhost:8080}
    volumes:
      # Mount appsettings for easy config changes without rebuild
      - ./appsettings.json:/app/appsettings.json:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - shopify-network

  # ── Redis (Session Store - Production Ready) ────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: shopify-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    networks:
      - shopify-network

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: shopify-nginx
    ports:
      - "8081:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - shopify-app
    restart: unless-stopped
    networks:
      - shopify-network

networks:
  shopify-network:
    driver: bridge

volumes:
  redis-data:
